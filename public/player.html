<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kokou Stats</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>Kokou Stats</h1>
      <nav>
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/about">About</a></li>
          <li><a href="/contact">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="search">
        <h2>Search Player</h2>
        <form action="/player/:username" method="GET">
          <label for="username">Username:</label>
          <input type="text" id="username" name="username" required />
          <button type="submit" id="view-stats">View Stats</button>
        </form>
      </section>
      <section id="stats-container">
        <h2>Player Stats</h2>
        <p>Loading player stats...</p>
      </section>
      <section class="error-message" style="display: none">
        <h2>Error</h2>
        <p>Unable to load player statistics. Please try again later.</p>
      </section>
      <section id="ships-container">
        <h2>Ships</h2>
        <p>Loading ship statistics...</p>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Kokou Stats. All rights reserved.</p>
    </footer>
    <script src="/player.js"></script>
  </body>
</html>
